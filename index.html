<!DOCTYPE html>
<html>
<head><title>SVCG Portal</title></head>
<body>
<h2>Apply</h2>
<input id="name" placeholder="Name"><br>
<input id="nin" placeholder="NIN"><br>
<button onclick="apply()">Submit</button>

<script>
async function apply(){
 const res = await fetch('/api/apply',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({name:document.getElementById('name').value,nin:document.getElementById('nin').value})});
 const data = await res.json();
 alert("Application ID: "+data.appId);
}
</script>
</body>
</html>
