<!DOCTYPE html>
<html>
<head>
<title>Student Venture Grant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header><h1>Student Venture Grant Portal</h1></header>

<div class="container">
<h2>Application Form</h2>

<form id="form">
<input placeholder="First Name" required>
<input placeholder="Surname" required>
<input placeholder="Other Name">
<input placeholder="NIN Number" required>
<input placeholder="ID Number" required>
<input type="email" placeholder="Email" required>

<select id="type" required>
<option value="">Institution Type</option>
<option value="University">University</option>
<option value="Polytechnic">Polytechnic</option>
<option value="College of Health">College of Health</option>
</select>

<input placeholder="Institution Name" required>

<button>Submit</button>
</form>

<p id="msg"></p>
</div>

<script src="script.js"></script>
</body>
</html>
