<!DOCTYPE html>
<html>
<head>
<title>Student Venture Grant</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Federal Student Venture Grant</h1></header>

<div class="container">
<h2>Apply</h2>
<form id="form">
<input placeholder="First Name" required>
<input placeholder="Surname" required>
<input placeholder="Other Name">
<input placeholder="NIN Number" required>
<input placeholder="ID Number" required>
<input type="email" placeholder="Email" required>

<select id="type">
<option value="">Select Type</option>
<option value="university">University</option>
<option value="polytechnic">Polytechnic</option>
<option value="health">College of Health</option>
</select>

<select id="school"></select>

<button>Submit</button>
</form>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
