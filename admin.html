
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>S-VCG Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-container">
        <h1>S-VCG Admin Dashboard</h1>
        <p>Authorized Personnel Only</p>
    </div>
</header>

<div class="container">
    <h2>Submitted Applications</h2>
    <table id="dataTable">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Institution</th>
                <th>Level</th>
                <th>PalmPay</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="clearData()" class="danger">Clear All Applications</button>
</div>

<script src="admin.js"></script>
</body>
</html>
